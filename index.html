<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You can't play video Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #mainScreen {
      text-align: center;
      color: white;
      animation: fadeIn 1s ease-in;
    }

    #mainScreen h1 {
      font-size: 4rem;
      margin-bottom: 20px;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
      animation: glitch 3s infinite;
    }

    #mainScreen p {
      font-size: 1.5rem;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    #startBtn {
      padding: 20px 50px;
      font-size: 1.5rem;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      text-transform: uppercase;
      font-weight: bold;
    }

    #startBtn:hover {
      background: #ff5252;
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    #gameContainer {
      display: none;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease-in;
    }

    #gameCanvas {
      border: 4px solid white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      background: #87ceeb;
    }

    #gameInfo {
      margin-top: 10px;
      color: white;
      text-align: center;
      max-width: 800px;
      width: 800px;
    }

    #levelInfo {
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 3px;
      color: #ffd700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #gameStats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 3px;
      flex-wrap: wrap;
    }

    #score {
      font-weight: bold;
      font-size: 0.95rem;
    }

    #starsCollected {
      font-weight: bold;
      font-size: 0.95rem;
      color: #ffd700;
    }

    #instructions {
      font-size: 0.75rem;
      opacity: 0.9;
      line-height: 1.2;
    }

    #levelTransition {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      animation: fadeIn 0.5s ease-in;
    }

    #levelTransition h2 {
      font-size: 3rem;
      color: #ffd700;
      margin-bottom: 20px;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
    }

    #levelTransition p {
      font-size: 1.5rem;
      color: white;
      margin-bottom: 30px;
    }

    #levelTransition .bonus {
      color: #ff6b6b;
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 15px;
      animation: pulse 1s infinite;
    }

    #continueBtn {
      padding: 15px 40px;
      font-size: 1.3rem;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      text-transform: uppercase;
      font-weight: bold;
    }

    #continueBtn:hover {
      background: #45a049;
      transform: scale(1.1);
    }

    #winScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      animation: fadeIn 0.5s ease-in;
    }

    #winScreen h2 {
      font-size: 4rem;
      color: #ffd700;
      margin-bottom: 20px;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
      animation: pulse 1s infinite;
    }

    #winScreen p {
      font-size: 2rem;
      color: white;
      margin-bottom: 30px;
    }

    #playAgainBtn {
      padding: 20px 50px;
      font-size: 1.5rem;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      text-transform: uppercase;
      font-weight: bold;
    }

    #playAgainBtn:hover {
      background: #ff5252;
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .hidden {
      display: none !important;
    }

    .invincible {
      opacity: 0.7;
      filter: drop-shadow(0 0 10px #00ff00);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translateX(0); }
      92% { transform: translateX(-2px); }
      94% { transform: translateX(2px); }
      96% { transform: translateX(-2px); }
      98% { transform: translateX(2px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>

  <!-- Main Screen -->
  <div id="mainScreen">
    <h1>You can't play video Games</h1>
    <p>...or can you? 🎮</p>
    <button id="startBtn">Play Anyway</button>
  </div>

  <!-- Level Transition Screen -->
  <div id="levelTransition">
    <div id="bonusLabel" class="bonus" style="display: none;">🎁 BONUS LEVEL 🎁</div>
    <h2 id="levelTitle">Level 1</h2>
    <p id="levelName">You are seperated</p>
    <button id="continueBtn">Continue</button>
  </div>

  <!-- Win Screen -->
  <div id="winScreen">
    <h2>🎉 YOU WON! 🎉</h2>
    <p>You completed all 6 levels!</p>
    <p>You CAN play video games! 🎮</p>
    <button id="playAgainBtn">Play Again</button>
  </div>

  <!-- Game Container -->
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="gameInfo">
      <div id="levelInfo">Level 1: You are seperated</div>
      <div id="gameStats">
        <div id="score">Score: 0</div>
        <div id="starsCollected">Stars: 0/3 ⭐</div>
      </div>
      <div id="instructions">
        Arrows/WASD: Move & Jump | Get 3 Stars ⭐
      </div>
    </div>
  </div>

  <script>
    // Main Screen Logic
    const mainScreen = document.getElementById('mainScreen');
    const gameContainer = document.getElementById('gameContainer');
    const startBtn = document.getElementById('startBtn');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelTransition = document.getElementById('levelTransition');
    const continueBtn = document.getElementById('continueBtn');
    const winScreen = document.getElementById('winScreen');
    const bonusLabel = document.getElementById('bonusLabel');
    const playAgainBtn = document.getElementById('playAgainBtn');

    startBtn.addEventListener('click', () => {
      mainScreen.classList.add('hidden');
      showLevelTransition(1);
    });

    continueBtn.addEventListener('click', () => {
      levelTransition.style.display = 'none';
      gameContainer.style.display = 'flex';
      startGame();
    });

    playAgainBtn.addEventListener('click', () => {
      winScreen.style.display = 'none';
      mainScreen.classList.remove('hidden');
      
      currentLevel = 1;
      score = 0;
      starsCollected = 0;
      gameRunning = false;
      invincible = false;
      invincibleTimer = 0;
      keys = {};
    });

    // Game Variables
    let score = 0;
    let starsCollected = 0;
    let currentLevel = 1;
    let gameRunning = false;
    let keys = {};
    let invincible = false;
    let invincibleTimer = 0;

    // Level animations
    let fairies = [];
    let raindrops = [];
    let fallingLeaves = [];
    let londonBus = { x: -150, y: 520, speed: 1.5 };
    let animatedBalloons = [];
    let animatedConfetti = [];
    let printerAnimation = { paperY: 0, isPrinting: false, printDelay: 0 };

    // Level Definitions
    const levels = {
      1: {
        name: "You are seperated",
        enemies: [
          { emoji: '👮‍♂️', x: 700, y: 400, speed: 0.7, jumpPower: 6 },
          { emoji: '🕵️', x: 100, y: 400, speed: 0.8, jumpPower: 7 },
          { emoji: '👨‍⚖️', x: 400, y: 200, speed: 0.6, jumpPower: 5 }
        ]
      },
      2: {
        name: "You are terminated",
        enemies: [
          { emoji: '👮‍♂️', x: 700, y: 400, speed: 0.8, jumpPower: 6 },
          { emoji: '👷‍♂️', x: 300, y: 300, speed: 0.8, jumpPower: 6 },
          { emoji: '👷‍♀️', x: 500, y: 250, speed: 0.7, jumpPower: 6 }
        ]
      },
      3: {
        name: "UK Police",
        enemies: [
          { emoji: '👮‍♂️', x: 700, y: 400, speed: 0.9, jumpPower: 7 },
          { emoji: '🤴', x: 200, y: 500, speed: 0.5, jumpPower: 4 },
          { emoji: '👸', x: 600, y: 350, speed: 0.6, jumpPower: 4 },
          { emoji: '👨‍⚕️', x: 150, y: 250, speed: 0.7, jumpPower: 5 }
        ]
      },
      4: {
        name: "Witchcraft",
        enemies: [
          { emoji: '👮‍♂️', x: 700, y: 400, speed: 1.0, jumpPower: 7 },
          { emoji: '🧞‍♀️', x: 400, y: 200, speed: 1.2, jumpPower: 8 },
          { emoji: '🧙', x: 100, y: 300, speed: 0.9, jumpPower: 6 }
        ]
      },
      5: {
        name: "You are pregnant",
        bonus: true,
        enemies: [
          { emoji: '👮‍♂️', x: 700, y: 400, speed: 1.2, jumpPower: 7 },
          { emoji: '🤰', x: 300, y: 300, speed: 0.6, jumpPower: 4 },
          { emoji: '🧑‍💻', x: 150, y: 250, speed: 1.0, jumpPower: 6 }
        ]
      },
      6: {
        name: "Leave",
        bonus: true,
        enemies: [
          { emoji: '👮‍♂️', x: 700, y: 400, speed: 1.4, jumpPower: 8 },
          { emoji: '🙅‍♀️', x: 300, y: 300, speed: 0.9, jumpPower: 6 },
          { emoji: '🍃', x: 400, y: 50, speed: 1.5, jumpPower: 0, special: 'falling' }
        ]
      }
    };

    const player = {
      x: 400,
      y: 500,
      width: 50,
      height: 50,
      velocityY: 0,
      velocityX: 0,
      speed: 5,
      jumpPower: 11,
      gravity: 0.4,
      onGround: true
    };

    let enemies = [];

    const platforms = [
      { x: 0, y: 550, width: 800, height: 50, color: '#2ecc71' },
      { x: 200, y: 450, width: 150, height: 20, color: '#27ae60' },
      { x: 450, y: 350, width: 150, height: 20, color: '#27ae60' },
      { x: 100, y: 250, width: 150, height: 20, color: '#27ae60' },
      { x: 550, y: 200, width: 150, height: 20, color: '#27ae60' }
    ];

    let collectibles = [];

    function initCollectibles() {
      collectibles = [
        { x: 250, y: 400, width: 30, height: 30, collected: false },
        { x: 500, y: 300, width: 30, height: 30, collected: false },
        { x: 150, y: 200, width: 30, height: 30, collected: false },
        { x: 600, y: 150, width: 30, height: 30, collected: false },
        { x: 50, y: 520, width: 30, height: 30, collected: false },
        { x: 650, y: 520, width: 30, height: 30, collected: false }
      ];
    }

    function initFairies() {
      fairies = [];
      for (let i = 0; i < 8; i++) {
        fairies.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height * 0.6,
          speedX: (Math.random() - 0.5) * 1.5,
          speedY: (Math.random() - 0.5) * 1.5,
          size: Math.random() * 10 + 8
        });
      }
    }

    function initRain() {
      raindrops = [];
      for (let i = 0; i < 50; i++) {
        raindrops.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          speed: Math.random() * 4 + 3,
          length: Math.random() * 15 + 15
        });
      }
    }

    function initFallingLeaves() {
      fallingLeaves = [];
      for (let i = 0; i < 8; i++) {
        fallingLeaves.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          speed: Math.random() * 1.5 + 1,
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 0.08,
          size: Math.random() * 20 + 15,
          sway: Math.random() * 3 - 1.5
        });
      }
    }

    function initAnimatedBalloons() {
      animatedBalloons = [];
      const positions = [
        {x: 100, y: 200}, {x: 150, y: 180}, {x: 700, y: 210},
        {x: 650, y: 190}, {x: 60, y: 250}, {x: 740, y: 260}
      ];
      const colors = ['#87ceeb', '#ffb6c1'];
      
      positions.forEach((pos, i) => {
        animatedBalloons.push({
          x: pos.x,
          y: pos.y,
          baseY: pos.y,
          color: colors[i % 2],
          floatOffset: Math.random() * Math.PI * 2,
          floatSpeed: 0.02 + Math.random() * 0.02,
          floatAmount: 10 + Math.random() * 10
        });
      });
    }

    function initAnimatedConfetti() {
      animatedConfetti = [];
      for (let i = 0; i < 40; i++) {
        animatedConfetti.push({
          x: Math.random() * canvas.width,
          y: Math.random() * 400 - 400,
          speed: Math.random() * 2 + 1,
          size: Math.random() * 8 + 4,
          color: i % 2 === 0 ? '#ff69b4' : '#87ceeb',
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 0.1,
          sway: Math.random() * 2 - 1
        });
      }
    }

    function showLevelTransition(level) {
      currentLevel = level;
      document.getElementById('levelTitle').textContent = `Level ${level}`;
      document.getElementById('levelName').textContent = levels[level].name;
      
      if (levels[level].bonus) {
        bonusLabel.style.display = 'block';
      } else {
        bonusLabel.style.display = 'none';
      }
      
      levelTransition.style.display = 'flex';
    }

    function loadLevel(level) {
      score = 0;
      starsCollected = 0;
      
      player.x = 400;
      player.y = 500;
      player.velocityX = 0;
      player.velocityY = 0;
      player.onGround = true;

      invincible = true;
      invincibleTimer = Date.now() + 3000;

      enemies = levels[level].enemies.map(enemy => ({
        ...enemy,
        width: 50,
        height: 50,
        velocityY: 0,
        velocityX: 0,
        gravity: 0.4,
        onGround: false,
        floatOffset: Math.random() * Math.PI * 2
      }));

      initCollectibles();

      if (level === 1) {
        printerAnimation = { paperY: 0, isPrinting: false, printDelay: 0 };
      }
      if (level === 3) {
        londonBus = { x: -150, y: 520, speed: 1.5 };
      }
      if (level === 4) {
        initFairies();
      }
      if (level === 5) {
        initAnimatedBalloons();
        initAnimatedConfetti();
      }
      if (level === 6) {
        initRain();
        initFallingLeaves();
      }

      const levelText = levels[level].bonus ? `🎁 Bonus Lvl ${level}: ${levels[level].name}` : `Level ${level}: ${levels[level].name}`;
      document.getElementById('levelInfo').textContent = levelText;
      document.getElementById('score').textContent = `Score: 0`;
      document.getElementById('starsCollected').textContent = `Stars: 0/3 ⭐`;
    }

    function checkLevelComplete() {
      const collectedCount = collectibles.filter(item => item.collected).length;
      
      if (collectedCount >= 3) {
        gameRunning = false;
        
        if (currentLevel < 6) {
          setTimeout(() => {
            showLevelTransition(currentLevel + 1);
          }, 1000);
        } else {
          setTimeout(() => {
            gameContainer.style.display = 'none';
            winScreen.style.display = 'flex';
          }, 1000);
        }
      }
    }

    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      
      if ((e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && player.onGround) {
        player.velocityY = -player.jumpPower;
        player.onGround = false;
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function startGame() {
      loadLevel(currentLevel);
      gameRunning = true;
      gameLoop();
    }

    function gameLoop() {
      if (!gameRunning) return;

      if (invincible && Date.now() > invincibleTimer) {
        invincible = false;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackground();
      updatePlayer();
      enemies.forEach(enemy => updateEnemy(enemy));
      drawPlatforms();
      drawCollectibles();
      enemies.forEach(enemy => drawEnemy(enemy));
      drawPlayer();

      if (!invincible) {
        enemies.forEach(enemy => checkEnemyCollision(enemy));
      }

      checkLevelComplete();
      requestAnimationFrame(gameLoop);
    }

    function drawBackground() {
      // LEVEL 1: OFFICE SETTING WITH ANIMATED PRINTER
      if (currentLevel === 1) {
        const wallGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        wallGradient.addColorStop(0, '#d4d4d4');
        wallGradient.addColorStop(1, '#b8b8b8');
        ctx.fillStyle = wallGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#87ceeb';
        ctx.fillRect(50, 50, 120, 150);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 4;
        ctx.strokeRect(50, 50, 120, 150);
        ctx.beginPath();
        ctx.moveTo(110, 50);
        ctx.lineTo(110, 200);
        ctx.moveTo(50, 125);
        ctx.lineTo(170, 125);
        ctx.stroke();

        ctx.fillStyle = '#87ceeb';
        ctx.fillRect(630, 50, 120, 150);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 4;
        ctx.strokeRect(630, 50, 120, 150);
        ctx.beginPath();
        ctx.moveTo(690, 50);
        ctx.lineTo(690, 200);
        ctx.moveTo(630, 125);
        ctx.lineTo(750, 125);
        ctx.stroke();

        // Animated Printer
        const printerX = 650;
        const printerY = 280;
        
        ctx.fillStyle = '#6a6a6a';
        ctx.fillRect(printerX, printerY, 80, 50);
        ctx.fillStyle = '#505050';
        ctx.fillRect(printerX, printerY, 80, 15);
        
        ctx.fillStyle = '#00aa00';
        ctx.fillRect(printerX + 10, printerY + 5, 25, 8);
        
        ctx.fillStyle = '#ff5555';
        ctx.fillRect(printerX + 45, printerY + 5, 8, 8);
        ctx.fillStyle = '#55ff55';
        ctx.fillRect(printerX + 55, printerY + 5, 8, 8);
        
        ctx.fillStyle = '#333';
        ctx.fillRect(printerX + 5, printerY + 20, 70, 5);
        
        printerAnimation.printDelay++;
        if (printerAnimation.printDelay > 120) {
          printerAnimation.isPrinting = true;
          printerAnimation.printDelay = 0;
        }
        
        if (printerAnimation.isPrinting) {
          printerAnimation.paperY += 1.5;
          
          ctx.fillStyle = '#fff';
          ctx.fillRect(printerX + 10, printerY + 25, 60, printerAnimation.paperY);
          ctx.strokeStyle = '#ddd';
          ctx.lineWidth = 1;
          ctx.strokeRect(printerX + 10, printerY + 25, 60, printerAnimation.paperY);
          
          if (printerAnimation.paperY > 10) {
            ctx.strokeStyle = '#333';
            for (let i = 0; i < Math.floor(printerAnimation.paperY / 8); i++) {
              ctx.beginPath();
              ctx.moveTo(printerX + 15, printerY + 30 + i * 8);
              ctx.lineTo(printerX + 65, printerY + 30 + i * 8);
              ctx.stroke();
            }
          }
          
          if (printerAnimation.paperY > 60) {
            printerAnimation.paperY = 0;
            printerAnimation.isPrinting = false;
          }
        }

        ctx.fillStyle = '#5a5a5a';
        ctx.fillRect(20, 400, 60, 150);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 400, 60, 150);
        ctx.beginPath();
        ctx.moveTo(20, 450);
        ctx.lineTo(80, 450);
        ctx.moveTo(20, 500);
        ctx.lineTo(80, 500);
        ctx.stroke();
        ctx.fillStyle = '#333';
        ctx.fillRect(45, 420, 10, 5);
        ctx.fillRect(45, 470, 10, 5);
        ctx.fillRect(45, 520, 10, 5);

        ctx.fillStyle = '#654321';
        ctx.fillRect(720, 450, 40, 100);
        ctx.fillStyle = '#2d5016';
        ctx.beginPath();
        ctx.ellipse(740, 440, 30, 40, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.fillRect(350, 80, 100, 120);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeRect(350, 80, 100, 120);
        ctx.fillStyle = '#ff6b6b';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('WORK', 400, 120);
        ctx.fillText('HARDER', 400, 140);
        ctx.fillStyle = '#333';
        ctx.font = '10px Arial';
        ctx.fillText('👔', 400, 170);

        ctx.fillStyle = 'rgba(100, 100, 120, 0.1)';
        for (let i = 0; i < canvas.width; i += 20) {
          ctx.fillRect(i, 540, 10, 10);
        }
      } 
      // LEVEL 2: CONSTRUCTION SITE
      else if (currentLevel === 2) {
        const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.6);
        skyGradient.addColorStop(0, '#87ceeb');
        skyGradient.addColorStop(1, '#b0d4f1');
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height * 0.6);

        ctx.fillStyle = '#8B7355';
        ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);
        
        ctx.fillStyle = '#7A6347';
        for (let i = 0; i < 50; i++) {
          const x = Math.random() * canvas.width;
          const y = canvas.height * 0.6 + Math.random() * canvas.height * 0.4;
          ctx.fillRect(x, y, 3, 3);
        }

        ctx.fillStyle = '#555';

    function updatePlayer() {
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        player.velocityX = -player.speed;
      } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        player.velocityX = player.speed;
      } else {
        player.velocityX = 0;
      }

      player.x += player.velocityX;
      player.velocityY += player.gravity;
      player.y += player.velocityY;

      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

      player.onGround = false;
      platforms.forEach(platform => {
        if (checkCollision(player, platform)) {
          if (player.velocityY > 0 && player.y + player.height - player.velocityY <= platform.y) {
            player.y = platform.y - player.height;
            player.velocityY = 0;
            player.onGround = true;
          }
        }
      });

      if (player.y > canvas.height) {
        player.x = 400;
        player.y = 500;
        player.velocityY = 0;
        player.onGround = true;
        invincible = true;
        invincibleTimer = Date.now() + 2000;
      }
    }

    function updateEnemy(enemy) {
      if (enemy.special === 'falling') {
        enemy.floatOffset += 0.03;
        enemy.x += Math.sin(enemy.floatOffset) * 1.5;
        enemy.y += 1;
        
        if (enemy.x < 0) enemy.x = 0;
        if (enemy.x + enemy.width > canvas.width) enemy.x = canvas.width - enemy.width;
        
        if (enemy.y > canvas.height) {
          enemy.x = Math.random() * (canvas.width - enemy.width);
          enemy.y = -50;
        }
        return;
      }

      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      if (!invincible || distance > 150) {
        if (Math.abs(dx) > 10) {
          if (dx > 0) {
            enemy.velocityX = enemy.speed;
          } else {
            enemy.velocityX = -enemy.speed;
          }
        } else {
          enemy.velocityX = 0;
        }
      } else {
        if (Math.abs(dx) > 10) {
          if (dx > 0) {
            enemy.velocityX = -enemy.speed * 0.5;
          } else {
            enemy.velocityX = enemy.speed * 0.5;
          }
        }
      }

      enemy.x += enemy.velocityX;
      enemy.velocityY += enemy.gravity;
      enemy.y += enemy.velocityY;

      if (enemy.x < 0) enemy.x = 0;
      if (enemy.x + enemy.width > canvas.width) enemy.x = canvas.width - enemy.width;

      enemy.onGround = false;
      platforms.forEach(platform => {
        if (checkCollision(enemy, platform)) {
          if (enemy.velocityY > 0 && enemy.y + enemy.height - enemy.velocityY <= platform.y) {
            enemy.y = platform.y - enemy.height;
            enemy.velocityY = 0;
            enemy.onGround = true;

            if (dy < -50 && Math.abs(dx) < 100 && enemy.onGround && (!invincible || distance > 150)) {
              enemy.velocityY = -enemy.jumpPower;
              enemy.onGround = false;
            }
          }
        }
      });

      if (enemy.y > canvas.height) {
        enemy.x = Math.random() * (canvas.width - enemy.width);
        enemy.y = 100;
        enemy.velocityY = 0;
      }
    }

    function drawPlayer() {
      ctx.font = '50px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      if (invincible) {
        ctx.shadowColor = '#00ff00';
        ctx.shadowBlur = 20;
      }
      
      ctx.fillText('🤵', player.x + player.width / 2, player.y + player.height / 2);
      ctx.shadowBlur = 0;
    }

    function drawEnemy(enemy) {
      ctx.font = '50px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      if (enemy.special === 'falling') {
        ctx.save();
        ctx.translate(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
        ctx.rotate(Math.sin(enemy.floatOffset) * 0.3);
        ctx.fillText(enemy.emoji, 0, 0);
        ctx.restore();
      } else {
        ctx.fillText(enemy.emoji, enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
      }
    }

    function drawPlatforms() {
      platforms.forEach(platform => {
        if (currentLevel === 1) {
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
          ctx.fillStyle = '#A0522D';
          ctx.fillRect(platform.x, platform.y, platform.width, 5);
          ctx.strokeStyle = '#654321';
          ctx.lineWidth = 2;
          ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
        }
        else if (currentLevel === 2) {
          ctx.fillStyle = '#505050';
          ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
          ctx.fillStyle = '#707070';
          ctx.fillRect(platform.x, platform.y, platform.width, 5);
          ctx.fillStyle = '#303030';
          const rivetCount = Math.floor(platform.width / 30);
          for (let i = 0; i < rivetCount; i++) {
            ctx.beginPath();
            ctx.arc(platform.x + 15 + i * 30, platform.y + 10, 3, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.strokeStyle = '#303030';
          ctx.lineWidth = 2;
          ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
        }
        else if (currentLevel === 3) {
          ctx.fillStyle = '#8B6914';
          ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
          ctx.strokeStyle = '#654321';
          ctx.lineWidth = 2;
          ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
        }
        else if (currentLevel === 4) {
          ctx.fillStyle= '#654321';
          ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
          ctx.fillStyle = '#8B6914';
          ctx.fillRect(platform.x, platform.y, platform.width, 3);
          ctx.strokeStyle = '#3d2817';
          ctx.lineWidth = 2;
          ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
        }
        else if (currentLevel === 5) {
          const colors = ['#ffb6c1', '#87ceeb'];
          const colorIndex = Math.floor(platform.x / 200) % 2;
          ctx.fillStyle = colors[colorIndex];
          ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 3;
          ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
        }
        else if (currentLevel === 6) {
          ctx.fillStyle = '#2d5016';
          ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
          ctx.fillStyle = '#3d6026';
          ctx.fillRect(platform.x, platform.y, platform.width, 5);
          ctx.strokeStyle = '#1a2f0f';
          ctx.lineWidth = 2;
          ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
        }
        else {
          ctx.fillStyle = platform.color;
          ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
          ctx.strokeStyle = '#229954';
          ctx.lineWidth = 2;
          ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
        }
      });
    }

    function drawCollectibles() {
      collectibles.forEach(item => {
        if (!item.collected) {
          drawStar(ctx, item.x + item.width / 2, item.y + item.height / 2, 5, 15, 7);

          if (checkCollision(player, item)) {
            item.collected = true;
            score += 10;
            starsCollected++;
            document.getElementById('score').textContent = `Score: ${score}`;
            document.getElementById('starsCollected').textContent = `Stars: ${starsCollected}/3 ⭐`;
          }
        }
      });
    }

    function checkEnemyCollision(enemy) {
      if (checkCollision(player, enemy)) {
        collectibles.forEach(item => {
          item.collected = false;
        });

        score = 0;
        starsCollected = 0;
        document.getElementById('score').textContent = `BUSTED! 🚨`;
        document.getElementById('starsCollected').textContent = `Stars: 0/3 ⭐`;
        
        setTimeout(() => {
          document.getElementById('score').textContent = `Score: 0`;
        }, 2000);

        player.x = 400;
        player.y = 500;
        player.velocityY = 0;
        player.velocityX = 0;
        player.onGround = true;
        
        invincible = true;
        invincibleTimer = Date.now() + 3000;
      }
    }

    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      const step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
      }
      
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
      ctx.fillStyle = '#ffd700';
      ctx.fill();
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function checkCollision(rect1, rect2) {
      return rect1.x < rect2.x + rect2.width &&
             rect1.x + rect1.width > rect2.x &&
             rect1.y < rect2.y + rect2.height &&
             rect1.y + rect1.height > rect2.y;
    }
  </script>
